config:
  backup: true
  banner: true
  create: true
  dotpath: system
  ignoreempty: false
  keepdot: false
  longkey: false
  showdiff: false
  workdir: ~/cyber/dotfiles
  import_variables:
    - config.d/70-variables-dev.yaml
    - config.d/80-vps-apps.yaml
actions:
  authentik-perms: |
    id -u authentik >/dev/null 2>&1 && \
    chown -R authentik:authentik {{@@ vps.apps.sso.home_dir @@}} && \
    chmod 600 {{@@ vps.apps.sso.home_dir @@}}/.env || true
  miniflux-perms: |
    id -u miniflux >/dev/null 2>&1 && \
    chown miniflux:miniflux /var/lib/miniflux/miniflux.conf /var/lib/miniflux/miniflux_admin_password && \
    chmod 600 /var/lib/miniflux/miniflux.conf /var/lib/miniflux/miniflux_admin_password || true
  nginx-link: ln -sf /etc/nginx/sites-mine/* /etc/nginx/sites-enabled/ || true
  nginx-reload: systemctl reload nginx || true
dotfiles:
  d_authentik:
    dst: "{{@@ vps.apps.sso.home_dir @@}}"
    src: authentik/
    actions:
      - authentik-perms
  f_bluetooth:
    dst: /etc/bluetooth/main.conf
    src: bluetooth/main.conf
  d_grub:
    dst: /etc/default/grub.d/
    src: grub
  d_miniflux:
    dst: "{{@@ vps.apps.rss.home_dir @@}}"
    src: miniflux/
    actions:
      - miniflux-perms
  d_nginx:
    dst: /etc/nginx/sites-mine/
    src: nginx/
    actions:
      - nginx-link
      - nginx-reload
  f_ssh:
    dst: /etc/ssh/sshd_config
    src: ssh/sshd_config
  d_sudoers:
    dst: /etc/sudoers.d/
    src: sudoers
  d_sysctl:
    dst: /etc/sysctl.d/
    src: sysctl
  d_systemd:
    dst: /etc/systemd/system/
    src: systemd/
  d_systemd-logind:
    dst: /etc/systemd/logind.conf.d/
    src: systemd-logind/
  d_systemd-user:
    dst: /etc/systemd/user@.service.d/
    src: systemd-user/
profiles:
  personal:
    dotfiles:
      - f_bluetooth
      - d_grub
      - f_ssh
      - d_sudoers
      - d_sysctl
      - d_systemd
      - d_systemd-logind
      - d_systemd-user
  khronos3d:
    dotfiles:
      - f_bluetooth
      - d_grub
      - f_ssh
      - d_sudoers
      - d_sysctl
      - d_systemd
      - d_systemd-logind
      - d_systemd-user
  vps:
    dotfiles:
      - d_authentik
      - d_miniflux
      - d_nginx
