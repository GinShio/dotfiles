actions:
    aria2-install: mkdir -p {{@@ sysenv.xdg_state_home @@}}/aria2 && touch {{@@ sysenv.xdg_state_home @@}}/aria2/aria2.session && mkdir -p {{@@ sysenv.xdg_cache_home @@}}/aria2 && touch {{@@ sysenv.xdg_cache_home @@}}/aria2/aria2.log
    samba-mkdir: cat {{@@ env['HOME'] @@}}/Public/.config.d/{{@@ profile @@}}.* 2>/dev/null |tr -s ' ' |cut -d' ' -f2 |sort |uniq |xargs -I@ bash -c 'mkdir -p $(eval echo @)'
