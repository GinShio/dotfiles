{%@@ from 'nginx/macros.j2' import server_block_base, proxy_pass with context @@%}

{%@@ call server_block_base(vps.apps.sso.domain, vps.domain) @@%}
        # Authentik needs larger body size for blueprint uploads and profile pictures
        client_max_body_size 20m;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

{{@@ proxy_pass(vps.apps.sso.bind, vps.apps.sso.port) @@}}
{%@@ endcall @@%}
