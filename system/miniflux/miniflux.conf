# Miniflux configuration file
# https://miniflux.app/docs/configuration.html

# Database connection
DATABASE_URL=user={{@@ vps.apps.rss.name @@}} password={{@@ vps_apps.rss.password @@}} dbname={{@@ vps.apps.rss.name @@}} sslmode=disable

# Base url
BASE_URL=https://{{@@ vps.apps.rss.domain @@}}

# Run database migrations automatically
RUN_MIGRATIONS=1

# Create initial admin user from file (dotdrop will deploy the secret file)
CREATE_ADMIN=1
ADMIN_USERNAME={{@@ vps.apps.rss.name @@}}
ADMIN_PASSWORD_FILE={{@@ vps.apps.rss.home_dir @@}}/miniflux_admin_password

# Listen address
LISTEN_ADDR={{@@ vps.apps.rss.bind @@}}:{{@@ vps.apps.rss.port @@}}

# Worker pool size
WORKER_POOL_SIZE=10

# Polling frequency
POLLING_FREQUENCY=60

# Metrics
METRICS_COLLECTOR=1
METRICS_ALLOWED_NETWORKS={{@@ vps.apps.rss.bind @@}}/8

# OIDC Configuration
OAUTH2_PROVIDER=oidc
OAUTH2_CLIENT_ID={{@@ vps_app_rss_oidc_client_id @@}}
OAUTH2_CLIENT_SECRET={{@@ vps_app_rss_oidc_client_secret @@}}
OAUTH2_REDIRECT_URL=https://{{@@ vps.apps.rss.domain @@}}/oauth2/oidc/callback
OAUTH2_OIDC_DISCOVERY_ENDPOINT=https://{{@@ vps.apps.sso.domain @@}}/application/o/{{@@ vps.apps.rss.name @@}}/
OAUTH2_USER_CREATION=1
