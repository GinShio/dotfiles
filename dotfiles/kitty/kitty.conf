# ═══════════════════════════════════════════════════════════════════
# kitty configuration  (~/.config/kitty/kitty.conf)
# kitty 設定檔
#
# Docs / 官方文件: https://sw.kovidgoyal.net/kitty/conf/
#
# Syntax / 語法:
#   - One directive per line: "<name> <value>", e.g. `font_size 12.0`.
#     每行一條指令：「指令 值」，例如 `font_size 12.0`。
#   - Lines starting with `#` are comments. 以 # 開頭的行是註釋。
#   - Reload after editing: press  ctrl+s r  (leader),  or run `kitty +kitten reload`.
#     編輯後重新載入：按 leader「ctrl+s r」，或執行 `kitty +kitten reload`。
#
# Keybinding model / 鍵位模型:
#   - Leader (prefix) key = ctrl+s.  Press ctrl+s, release, then the action key.
#     Leader（前綴）鍵 = ctrl+s。先按 ctrl+s，放開，再按動作鍵。
#   - A single dedicated leader keeps the whole keymap collision-free with
#     terminal programs, because only ctrl+s itself is intercepted; every
#     following key is captured by kitty and never reaches the running program.
#     用單一前綴可讓整套鍵位不與終端程式衝突：只有 ctrl+s 本身被攔截，
#     其後的按鍵都由 kitty 接手，不會傳進正在執行的程式。
#   - A few universal chords stay direct (clipboard, scrolling) for speed.
#     少數通用和絃（剪貼簿、捲動）保留為直接按鍵以求快捷。
# ═══════════════════════════════════════════════════════════════════


# =============================================================================
#  1. Fonts / 字型
# =============================================================================
# Primary monospace font. Must be installed; list with `kitty +list-fonts`.
# 主要等寬字型。須已安裝；用 `kitty +list-fonts` 列出可用字型。
font_family        Hasklug Nerd Font Mono
bold_font          auto
italic_font        auto
bold_italic_font   auto

# Font size in points. 字型大小（pt）。
font_size          9.0

# Ligatures / 連字:
#   never  = always render ligatures (do NOT disable). 一律顯示連字（不停用）。
#   always = never render ligatures (disable everywhere). 全域停用連字。
#   cursor = disable only under the cursor. 僅游標處停用連字。
disable_ligatures never

# OpenType features (e.g. slashed zero `zero`, stylistic sets `cv01`..).
# OpenType 特性（如斜線零 `zero`、風格變體 `cv01`..）。
# Syntax: font_features <family-token> +feat -feat ...  (family must be a
# space-less token and the feature must be supported by the font).
# 語法：font_features <無空格族名> +特性 -特性 ...（族名不可含空格，且字型須支援）。
# font_features HasklugNerdFontMono +zero

# Fine-tune cell metrics if needed (baseline / cell height).
# 需要時可微調字元格度量（基線 / 行高）。
# modify_font cell-height +2pt

# --- CJK fallback / 中日韓字型對應 ---------------------------------------------
# Map CJK code ranges to a dedicated font to avoid tofu / mismatched glyphs.
# 把 CJK 字碼區段指定到專用字型，避免方框或字型不一致。
symbol_map U+4E00-U+9FFF,U+3400-U+4DBF,U+F900-U+FAFF Microsoft JhengHei
symbol_map U+3000-U+303F,U+3040-U+30FF,U+FF00-U+FFEF Microsoft JhengHei

# Text shaping strategy. `platform` uses the OS text renderer settings.
# 文字排版策略。`platform` 採用作業系統的文字渲染設定。
text_composition_strategy platform


# =============================================================================
#  2. Cursor / 游標
# =============================================================================
# cursor_shape: block | beam | underline. 游標形狀。
cursor_shape            block
cursor_beam_thickness   1.6
# Blink interval in seconds; 0 = no blinking. 閃爍間隔（秒）；0 = 不閃爍。
cursor_blink_interval   0


# =============================================================================
#  3. Scrollback / 捲動緩衝
# =============================================================================
# Number of lines kept in the scrollback buffer. 保留的歷史行數。
scrollback_lines            65535
# External pager used to browse the full scrollback (leader: ctrl+s v).
# 用來瀏覽完整歷史的外部分頁器（leader：ctrl+s v）。
scrollback_pager            less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 128
# Multipliers for scroll speed. 捲動速度倍率。
wheel_scroll_multiplier     5.0
touch_scroll_multiplier     1.0


# =============================================================================
#  4. Mouse / 滑鼠
# =============================================================================
# Seconds of typing after which the mouse pointer is hidden. 打字後隱藏指標的秒數。
mouse_hide_wait          3.0
# Style used to underline detected URLs. 偵測到的網址的底線樣式。
url_style                curly
open_url_with            default
detect_urls              yes
# Do NOT copy to selection automatically on mouse-select. 關閉「選取即複製」。
copy_on_select           no
strip_trailing_spaces    smart
# Disable the right-click action. 關閉右鍵動作。
mouse_map right press ungrabbed no_op
# Ctrl+left-click opens the URL under the pointer. Ctrl+左鍵點擊開啟連結。
mouse_map ctrl+left press grabbed,ungrabbed mouse_click_url


# =============================================================================
#  5. Performance & Bell / 效能與提示音
# =============================================================================
# Screen repaint delay in ms; lower = smoother but more power. 重繪延遲（ms），越小越流暢也越耗電。
repaint_delay        8
input_delay          3
# Vertical sync to avoid tearing. 垂直同步，避免畫面撕裂。
sync_to_monitor      yes
# Silence the audible bell. 關閉嗶聲。
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab          "🔔 "
# Allow programs to control kitty remotely (used by `kitty @ ...`).
# 允許程式透過遠端控制操作 kitty（供 `kitty @ ...` 使用）。
allow_remote_control yes
listen_on            unix:@kitty
# Launch fish inside kitty without changing the system login shell.
# 在 kitty 內啟動 fish，而不更動系統登入 shell。
shell                /usr/bin/fish
# Shell integration; `no-cursor` stops the shell from overriding cursor shape,
# so the block cursor set above stays in effect at the prompt.
# Shell 整合；`no-cursor` 讓 shell 不接管游標形狀，使上面設定的塊狀游標在提示字元處保持生效。
shell_integration    enabled no-cursor


# =============================================================================
#  6. Window & Layout / 視窗與版面
# =============================================================================
# Inner padding in pixels: "<vertical> <horizontal>". 視窗內邊距（像素）：「上下 左右」。
window_padding_width    2 1
# Borderless / titlebar-less window. 無邊框、無標題列。
hide_window_decorations yes
# Do not restore previous size; let the WM decide. 不記憶大小，交給視窗管理器決定。
remember_window_size    no
# Initial size in cells (c). 初始大小（以字元格 c 為單位）。
initial_window_width    120c
initial_window_height   34c

# Available layouts, cycled with the leader (ctrl+s space):
# 可用版面，用 leader（ctrl+s space）循環切換：
#   splits = free left/right & top/bottom splitting. 自由左右／上下分割。
#   stack  = single full-window (acts as zoom). 單一全視窗（充當 zoom）。
#   tall   = one big + stacked on the right. 一大窗 + 右側堆疊。
#   fat    = one big + stacked below. 一大窗 + 下方堆疊。
#   grid   = grid arrangement. 網格排列。
enabled_layouts         splits,stack,tall,fat,grid

# Border width between splits (0 = no border). 分割之間的邊框寬度（0 = 不畫）。
window_border_width      0.3
draw_minimal_borders     yes
# Dim text of inactive splits slightly. 非作用中分割的文字稍微變淡。
inactive_text_alpha      0.85
# Background opacity 0.0..1.0 (1.0 = opaque). 背景不透明度 0.0..1.0（1.0 為不透明）。
background_opacity       0.95
# Uncomment to change opacity on the fly. 取消註釋以支援即時調整透明度。
# dynamic_background_opacity yes
# Ask before closing if programs are still running. 若仍有程式在跑則關閉前詢問。
confirm_os_window_close   1


# =============================================================================
#  7. Tab bar / 分頁列
# =============================================================================
# tab_bar_edge: top | bottom. 分頁列位置。
tab_bar_edge             bottom
# tab_bar_style: fade | slant | separator | powerline | custom | hidden.
tab_bar_style            powerline
tab_powerline_style      slanted
# Show the tab bar even with a single tab. 只有一個分頁時也顯示分頁列。
tab_bar_min_tabs         1
tab_title_template       "{index}: {title}"
active_tab_font_style    bold
inactive_tab_font_style  normal


# =============================================================================
#  8. Keyboard shortcuts / 鍵盤快捷鍵
# =============================================================================
#  Format / 格式:  map <keys> <action>
#  Modifiers / 修飾鍵:  ctrl / shift / alt / super
#  Leader / 前綴:  ctrl+s   (written in sequences as `ctrl+s>key`)
#                  ctrl+s（在序列中寫作 `ctrl+s>key`）
#
#  ┌─ Action map (after leader unless marked "direct") ───────────────┐
#  │  按鍵對照（除標「direct」外，皆須先按 leader ctrl+s）             │
#  ├──────────────────────────────────────────────────────────────────┤
#  │  key      action / 動作                                            │
#  │  t        new tab               新分頁                             │
#  │  q        close tab             關閉分頁                           │
#  │  n / p    next / prev tab       下一個 / 上一個分頁                │
#  │  1..9     go to tab N           跳到第 N 個分頁                    │
#  │  , / .    move tab back / fwd   往前 / 往後移動分頁               │
#  │  [ / ]    split L-R / T-B       左右分割 / 上下分割               │
#  │  x        close split           關閉分割                          │
#  │  z        zoom (stack layout)   最大化當前分割                    │
#  │  arrows   move focus            方向鍵：切換分割焦點              │
#  │  r        resize mode           進入調整大小模式                  │
#  │  space    cycle layout          循環版面                          │
#  │  f / b    rotate split fwd/back 旋轉分割位置                      │
#  │  v        view scrollback       瀏覽捲動歷史                      │
#  │  g        last command output   上一個指令的輸出                  │
#  │  R        reload config         重新載入設定                      │
#  │  ─ direct chords / 直接和絃 ─                                      │
#  │  ctrl+shift+c / v / s   copy / paste / paste-selection  複製/貼上 │
#  │  ctrl+shift+PgUp/PgDn/Home/End   scrolling  捲動                  │
#  │  ctrl+shift+e / u                url hints / unicode input        │
#  └──────────────────────────────────────────────────────────────────┘
# -----------------------------------------------------------------------------
# Clear every built-in binding; only the ones defined below remain active.
# 清空所有內建綁定，只保留下方自訂的。
clear_all_shortcuts yes

# --- Direct chords / 直接和絃 -------------------------------------------------
# Clipboard. c/v = system clipboard, s = primary (mouse) selection.
# 剪貼簿。c/v = 系統剪貼簿，s = 滑鼠選取區（primary selection）。
map ctrl+shift+c   copy_to_clipboard
map ctrl+shift+v   paste_from_clipboard
map ctrl+shift+s   paste_from_selection

# Scrolling. 捲動。
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
# Clear screen and scrollback up to the cursor. 清除畫面與游標前的歷史。
map ctrl+shift+k         clear_terminal to_cursor active

# Kittens. 小工具。
# Pick a URL on screen with the keyboard and open it. 用鍵盤選取畫面上的連結並開啟。
map ctrl+shift+e         open_url_with_hints
# Insert a path / line / word / hash from the screen into the command line.
# 從畫面選取 路徑 / 整行 / 單字 / hash 填入命令列。
map ctrl+shift+p>f       kitten hints --type path --program -
map ctrl+shift+p>l       kitten hints --type line --program -
map ctrl+shift+p>w       kitten hints --type word --program -
map ctrl+shift+p>h       kitten hints --type hash --program -
# Unicode character input. Unicode 字元輸入器。
map ctrl+shift+u         kitten unicode_input

# --- Leader: Tabs / 前綴：分頁 ------------------------------------------------
map ctrl+s>t         new_tab_with_cwd
map ctrl+s>q         close_tab
map ctrl+s>n         next_tab
map ctrl+s>p         previous_tab
map ctrl+s>comma     move_tab_backward
map ctrl+s>period    move_tab_forward
map ctrl+s>1         goto_tab 1
map ctrl+s>2         goto_tab 2
map ctrl+s>3         goto_tab 3
map ctrl+s>4         goto_tab 4
map ctrl+s>5         goto_tab 5
map ctrl+s>6         goto_tab 6
map ctrl+s>7         goto_tab 7
map ctrl+s>8         goto_tab 8
map ctrl+s>9         goto_tab 9

# --- Leader: Splits / 前綴：分割 ----------------------------------------------
# `[` splits left/right (new split on the right, side-by-side).
# `[` 左右分割（新分割在右側，並排）。
map ctrl+s>[         launch --location=vsplit --cwd=current
# `]` splits top/bottom (new split below, stacked).
# `]` 上下分割（新分割在下方，堆疊）。
map ctrl+s>]         launch --location=hsplit --cwd=current
# Close the current split. 關閉當前分割。
map ctrl+s>x         close_window
# Zoom / restore the current split (stack layout as zoom). 最大化 / 還原當前分割。
map ctrl+s>z         toggle_layout stack
# Move focus between splits with the arrow keys. 用方向鍵在分割間移動焦點。
map ctrl+s>left      neighboring_window left
map ctrl+s>right     neighboring_window right
map ctrl+s>up        neighboring_window up
map ctrl+s>down      neighboring_window down
# Rotate / swap split positions. 旋轉 / 交換分割位置。
map ctrl+s>f         move_window_forward
map ctrl+s>b         move_window_backward
# Cycle through the enabled layouts. 循環切換版面。
map ctrl+s>space     next_layout

# --- Leader: Scrollback / 前綴：歷史 ------------------------------------------
# Browse the full scrollback in the pager. 用分頁器瀏覽完整歷史。
map ctrl+s>v         show_scrollback
# Browse only the output of the last command (needs shell integration).
# 只瀏覽「上一個指令」的輸出（需 shell 整合）。
map ctrl+s>g         show_last_command_output

# --- Leader: Config / 前綴：設定 ----------------------------------------------
# Open this config file in the editor. 用編輯器開啟本設定檔。
map ctrl+s>f2        edit_config_file
# Reload configuration. 重新載入設定。
map ctrl+s>f5        load_config_file
map ctrl+s>f6        debug_config

# --- Leader: Fullscreen / 前綴：全螢幕 ----------------------------------------
map ctrl+s>f11       toggle_fullscreen
map ctrl+s>f10       toggle_maximized

# --- Resize mode / 調整大小模式 ----------------------------------------------
# Enter with  ctrl+s r , then use the arrow keys repeatedly; `=` resets sizes;
# Esc or Enter leaves the mode.
# 用 ctrl+s r 進入，接著可連續按方向鍵；`=` 重設大小；Esc 或 Enter 退出。
map --new-mode resize ctrl+s>r
map --mode resize left    resize_window narrower
map --mode resize right   resize_window wider
map --mode resize up      resize_window taller
map --mode resize down    resize_window shorter
map --mode resize equal   reset_window_sizes
map --mode resize esc     pop_keyboard_mode
map --mode resize enter   pop_keyboard_mode


# =============================================================================
#  9. Misc / 其他
# =============================================================================
# Characters treated as part of a word when double-click selecting.
# 雙擊選取時視為「單字一部分」的字元。
select_by_word_characters @-./_~?&=%+#
# Disable the periodic update check. 關閉定期更新檢查。
update_check_interval 0


# =============================================================================
#  10. Theme / 主題
# =============================================================================
# Change themes by running `kitty +kitten themes`.
# 換主題請執行 `kitty +kitten themes`。
include theme-konsole-breeze-dark.conf
