[project]
org = "{{@@ projects.source_info['mesa'].org @@}}"
build_system = "meson"
generator = "ninja"
toolchain = "clang"
build_dir = "{{work.dir}}/_build/{{branch.slug}}-{{build_type}}"
install_dir = "{{work.dir}}/_build/{{branch.slug}}-{{build_type}}"
default_presets = ["common"]

[repos.main]
path = "{{@@ projects.root_dir @@}}/{{project.org}}/{{project.name}}"
main_branch = "main"
[repos.main.remotes]
upstream = "https://gitlab.freedesktop.org/mesa/mesa.git"
origin = "https://gitlab.freedesktop.org/GinShio/mesa.git"

[project.presets.common.definitions]
gallium-drivers = "radeonsi,zink,llvmpipe"
vulkan-drivers = "amd,swrast"
gallium-rusticl = true

