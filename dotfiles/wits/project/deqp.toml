[project]
org = "{{@@ projects.source_info['deqp'].org @@}}"
build_system = "cmake"
generator = "Ninja Multi-Config"
toolchain = "clang"
build_dir = "{{work.dir}}/_build/{{branch.slug}}"
install_dir = "{{work.dir}}/_build/{{branch.slug}}"
default_presets = ["common"]

[repos.main]
path = "{{@@ projects.root_dir @@}}/{{project.org}}/{{project.name}}"
main_branch = "main"
[repos.main.remotes]
origin = "https://github.com/KhronosGroup/VK-GL-CTS.git"
[repos.main.hooks]
pre_update = "python3 external/fetch_sources.py --force --clean"
post_update = "python3 external/fetch_sources.py"

[project.presets.common.definitions]
DEQP_TARGET = "default"
