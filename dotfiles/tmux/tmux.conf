# ═══════════════════════════════════════════════════════════════════
# tmux configuration  (~/.config/tmux/tmux.conf)
# tmux 設定檔
#
# Keybinding model / 鍵位模型:
#   - Leader (prefix) key = C-t.  Press C-t, release, then the action key.
#     Leader（前綴）鍵 = C-t。先按 C-t，放開，再按動作鍵。
#   - C-t is chosen because it does not collide with common line-editing keys
#     (C-a begin-of-line, C-e end-of-line, C-b back). Press C-t twice to send a
#     literal C-t to the program running inside.
#     選 C-t 是因為它不與常用行編輯鍵衝突（C-a 行首、C-e 行尾、C-b 後退）；
#     連按兩次 C-t 可把「字面的 C-t」送給內層程式。
#
#   Action map (after leader C-t) / 按鍵對照（先按 leader C-t）:
#     t        new window            新視窗
#     q        close window          關閉視窗
#     n / p    next / prev window    下一個 / 上一個視窗
#     1..9     go to window N        跳到第 N 個視窗
#     , / .    move window back/fwd  往前 / 往後移動視窗
#     [ / ]    split L-R / T-B       左右分割 / 上下分割
#     x        close pane            關閉窗格
#     z        zoom pane             最大化窗格
#     arrows   move focus            方向鍵：切換窗格焦點
#     r        resize mode           進入調整大小模式
#     Space    cycle layout          循環版面
#     f / b    rotate pane fwd/back  旋轉窗格位置
#     v        copy-mode (view)      進入 copy-mode（捲動／選取）
#     P        paste buffer          貼上緩衝區
#     R        reload config         重新載入設定
#     i        show pane numbers     顯示窗格編號
#     :        command prompt        指令輸入列
#     ?        list all bindings     列出所有鍵位
#   Sessions (tmux-only) / 工作階段（tmux 專屬）:
#     ( / )    prev / next session   上一個 / 下一個工作階段
#     L        last session          切回上一個工作階段
#     s / w    session / window tree 工作階段 / 視窗清單選擇器
#     $        rename session        重新命名工作階段
#     d        detach                卸離 (detach)
# ═══════════════════════════════════════════════════════════════════


# ---- Leader / 前綴 ----------------------------------------------------------
# Wipe every default binding in the prefix table first, so only the keys we
# define below remain (like kitty's `clear_all_shortcuts`). We deliberately do
# NOT clear the `root` table (mouse) or the `copy-mode` tables, otherwise mouse
# scrolling and in-copy-mode selection would stop working.
# 先清空 prefix 表的所有預設綁定，只保留下方我們定義的鍵（等同 kitty 的
# `clear_all_shortcuts`）。刻意不清 `root`（滑鼠）與 `copy-mode` 表，
# 否則滑鼠捲動與 copy-mode 內的選取會失效。
unbind -a -T prefix

set -g prefix C-t
# Press C-t twice to send a literal C-t to the inner program.
# 連按兩次 C-t，把字面的 C-t 送給內層程式。
bind-key C-t send-prefix


# ---- Terminal / colours / 終端與顏色 ----------------------------------------
# Advertise a 256-colour, true-colour capable terminal to programs inside.
# 對內層程式宣告一個支援 256 色與真彩色的終端。
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -as terminal-features ",xterm-kitty:RGB"
# Shorten the wait after ESC so Meta keys feel instant in editors.
# 縮短 ESC 之後的等待，讓編輯器中的 Meta 鍵反應即時。
set -sg escape-time 10
# Forward terminal focus events (editors use them to auto-save/revert).
# 轉送終端 focus 事件（編輯器用來自動儲存／還原）。
set -g focus-events on


# ---- General / 一般行為 -----------------------------------------------------
set -g history-limit 262144
set -g mouse on
setw -q -g utf8 on
set-option -g status off
set-option -g default-shell "/usr/bin/fish"
# Number windows/panes from 1 (so leader 1 selects the first window).
# 視窗／窗格從 1 開始編號（因此 leader 1 選到第一個視窗）。
set -g base-index 1
setw -g pane-base-index 1
# Renumber windows to stay sequential after one is closed.
# 關閉視窗後自動重新編號，保持連續。
set -g renumber-windows on
# Use Emacs key bindings inside copy-mode. copy-mode 內使用 Emacs 鍵位。
setw -g mode-keys emacs


# ═══ Keybindings / 鍵位 ══════════════════════════════════════════════════════

# ---- Windows / 視窗 ----------------------------------------------------------
bind t new-window -c "#{pane_current_path}"
bind q kill-window
bind -r n next-window
bind -r p previous-window
bind , swap-window -d -t -1
bind . swap-window -d -t +1
# Go to window N. 跳到第 N 個視窗。
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# ---- Panes / 窗格 ------------------------------------------------------------
# `[` splits left/right.
# `[` 左右分割。
bind [ split-window -h -c "#{pane_current_path}"
# `]` splits top/bottom.
# `]` 上下分割。
bind ] split-window -v -c "#{pane_current_path}"
bind x kill-pane
bind z resize-pane -Z
bind f swap-pane -D
bind b swap-pane -U
bind Space next-layout
# Move focus with arrows (repeatable within the repeat window).
# 用方向鍵移動焦點（可在 repeat 視窗內連續按）。
bind -r Left  select-pane -L
bind -r Right select-pane -R
bind -r Up    select-pane -U
bind -r Down  select-pane -D

# ---- Resize mode / 調整大小模式 ---------------------------------------------
# Enter with  C-t r , then press arrows repeatedly; Esc leaves the mode.
# 用 C-t r 進入，接著可連續按方向鍵；Esc 退出。
bind r switch-client -T RESIZE
bind -T RESIZE Left   resize-pane -L 5 \; switch-client -T RESIZE
bind -T RESIZE Right  resize-pane -R 5 \; switch-client -T RESIZE
bind -T RESIZE Up     resize-pane -U 3 \; switch-client -T RESIZE
bind -T RESIZE Down   resize-pane -D 3 \; switch-client -T RESIZE
bind -T RESIZE Escape switch-client -T root

# ---- Copy-mode / 複製模式 ---------------------------------------------------
# copy-mode and paste move to v / P.
# copy-mode 與貼上改到 v / P。
bind v copy-mode
bind P paste-buffer

# ---- Sessions / 工作階段 ----------------------------------------------------
# Made explicit (these are also tmux defaults) so they are documented and
# survive any future change to the built-in bindings.
# 顯式寫出（同為 tmux 預設），以便有文件記錄，且不受日後預設變動影響。
bind ( switch-client -p
bind ) switch-client -n
bind L switch-client -l
bind s choose-tree -Zs
bind w choose-tree -Zw
bind $ command-prompt -I "#S" { rename-session "%%" }
bind d detach-client

# ---- Misc / 其他 ------------------------------------------------------------
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
# Show pane numbers. 顯示窗格編號。
bind i display-panes
# Essential built-ins re-added after the wipe above.
# 上面清空後，重新加回必要的基礎鍵。
bind : command-prompt
bind ? list-keys
# Note: `,` now moves a window (see Windows section); rename-window is no longer
# bound. Ask if you want it back on a dedicated key.
# 注意：`,` 現在用於移動視窗（見 Windows 段），rename-window 已無綁定；
# 若想保留可要求指定一個鍵。


# ---- Local config / 本機額外設定 --------------------------------------------
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'
